<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Skills - Galaxies</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100vw; height: 100vh;
      background: #000; overflow: hidden;
      font-family: 'JetBrains Mono', monospace;
      color: #e2f4f8;
    }
    
    #visual { position: fixed; inset: 0; z-index: 1; display: block; }
    
    #selectable {
      position: fixed; inset: 0; z-index: 2;
      font-family: 'Courier New', monospace;
      white-space: pre; line-height: 1;
      color: transparent; background: transparent;
      cursor: crosshair;
      user-select: text; -webkit-user-select: text;
      overflow: hidden;
    }
    #selectable::selection { background: rgba(0,229,255,0.3); color: transparent; }

    /* Curtain effect overlays */
    .curtain {
      position: fixed; top: 0; height: 100vh; width: 50vw;
      background: #000; z-index: 100;
      transition: transform 1.5s cubic-bezier(0.8, 0, 0.2, 1);
    }
    #curtain-left { left: 0; transform-origin: left; }
    #curtain-right { right: 0; transform-origin: right; }
    body.loaded #curtain-left { transform: scaleX(0); }
    body.loaded #curtain-right { transform: scaleX(0); }

    /* Skill detail overlay */
    #skill-detail {
      position: fixed; inset: 0; z-index: 50;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.5s ease;
    }
    #skill-detail.active {
      opacity: 1; pointer-events: auto;
    }
    
    .skill-card {
      border: 1px solid rgba(0,229,255,0.4);
      background: rgba(2, 8, 22, 0.9);
      padding: 3rem; max-width: 600px; width: 90%;
      box-shadow: 0 0 40px rgba(0,229,255,0.1);
      transform: translateY(30px);
      transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    #skill-detail.active .skill-card { transform: translateY(0); }
    
    .category {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.5rem; font-weight: 700; text-transform: uppercase;
      color: #fff; margin-bottom: 1rem;
      text-shadow: 0 0 15px rgba(0,229,255,0.5);
    }
    .tools {
      font-size: 0.9rem; color: #10b981; margin-bottom: 2rem;
      letter-spacing: 0.1em;
    }
    .desc {
      font-size: 0.85rem; color: rgba(255,255,255,0.7); line-height: 1.6;
      margin-bottom: 2rem;
    }
    .btn-close {
      display: inline-block; padding: 0.6rem 1.5rem;
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff; text-decoration: none; text-transform: uppercase; font-size: 0.8rem;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-close:hover { border-color: #00e5ff; color: #00e5ff; }

    /* HUD */
    #hud {
      position: fixed; top: 2rem; left: 2rem; z-index: 20; pointer-events: none;
    }
    .hud-text { font-size: 0.75rem; color: rgba(0,229,255,0.7); letter-spacing: 0.2em; text-transform: uppercase; }

    #back-btn {
      position: fixed; top: 2rem; right: 2rem; z-index: 20;
      padding: 0.5rem 1rem; color: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.2); text-decoration: none;
      font-size: 0.75rem; letter-spacing: 0.1em; transition: all 0.2s;
    }
    #back-btn:hover { color: #fff; border-color: #fff; }

    #btn-next-img {
      position: fixed; bottom: 2rem; right: 2rem; z-index: 20;
      background: transparent; border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.3); padding: 0.5rem 1rem;
      font-family: 'JetBrains Mono', monospace; font-size: 0.75rem;
      cursor: pointer; transition: all 0.2s; text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    #btn-next-img:hover {
      border-color: rgba(0,229,255,0.5); color: #00e5ff;
      text-shadow: 0 0 8px rgba(0,229,255,0.4);
    }
  </style>
</head>
<body>

  <div id="curtain-left" class="curtain"></div>
  <div id="curtain-right" class="curtain"></div>

  <canvas id="visual"></canvas>
  <pre id="selectable" aria-label="ASCII art — selectable"></pre>

  <div id="hud">
    <div class="hud-text">SECTOR: SKILLS_NET</div>
    <div class="hud-text" style="color: rgba(255,255,255,0.4); margin-top: 5px;">CLICK CORE TO INSPECT</div>
  </div>
  
  <a href="ascii-bg.html" id="back-btn">[ RETURN ]</a>
  <button id="btn-next-img" title="Switch underlying galaxy image">[ NEXT DATASET ]</button>

  <div id="skill-detail">
    <div class="skill-card">
      <div class="category" id="modal-title">CATEGORY</div>
      <div class="tools" id="modal-tools">TOOL_1 // TOOL_2 // TOOL_3</div>
      <div class="desc" id="modal-desc">Detailed analytics and skill profiling placeholder.</div>
      <a class="btn-close" id="btn-close">[ CLOSE ]</a>
    </div>
  </div>

   <script type="module">
    const skillsData = [
      { id: 'frontend', title: 'FRONTEND', desc: 'Crafting immersive, high-performance interfaces with modern frameworks and web APIs.', tools: 'REACT // NEXT.JS // TYPESCRIPT // TAILWIND // THREE.JS' },
      { id: 'backend', title: 'BACKEND', desc: 'Building scalable, secure server-side architectures and APIs.', tools: 'NODE.JS // PYTHON // POSTGRES // REDIS' },
      { id: 'automation', title: 'AUTOMATION', desc: 'Streamlining workflows and tasks through robust scripting and automation pipelines.', tools: 'BASH // PYTHON // GITHUB ACTIONS // PUPPETEER' },
      { id: 'system', title: 'SYSTEM DESIGN', desc: 'Architecting end-to-end resilient systems tailored for distributed scale.', tools: 'MICROSERVICES // CACHING // EVENT-DRIVEN // LOAD BALANCING' },
      { id: 'cloud', title: 'CLOUD', desc: 'Deploying and orchestrating containerized applications on cloud infrastructure.', tools: 'AWS // DOCKER // KUBERNETES // TERRAFORM' }
    ];

    const images = ['galaxy-1.jpg', 'galaxy-2.webp', 'galaxy-4.webp', 'galaxy.webp'];
    let currentImgIdx = Math.floor(Math.random() * images.length);

    const FONT_PX = 9;
    const FONT_STR = `${FONT_PX}px "Courier New", Courier, monospace`;
    const CHARS_SRC = '01djeofwe;jfQWERTYUIOASDFGHJKLZXCVBNM@'; 
    const CHARS_DIST = '@01#$%&*!?+=-_~:;., '; // Natural distortion characters
    
    let charW = FONT_PX * 0.601;
    const charH = FONT_PX;
    
    const oc = new OffscreenCanvas(400,20).getContext('2d');
    oc.font = FONT_STR;
    charW = oc.measureText('X'.repeat(50)).width / 50;

    let W, H, cols, rows, N;
    let origChars, colR, colG, colB;
    
    const canvas = document.getElementById('visual');
    const ctx = canvas.getContext('2d');
    const pre = document.getElementById('selectable');
    const imgObj = new Image();
    imgObj.crossOrigin = 'anonymous';

    // Camera
    let cam = { x: 0, y: 0, scale: 1, targetX: 0, targetY: 0, targetScale: 1 };
    let time = 0;
    
    function setupGrid() {
      W = window.innerWidth;
      H = window.innerHeight;
      cols = Math.floor(W / charW);
      rows = Math.floor(H / charH);
      N = cols * rows;

      canvas.width = W; 
      canvas.height = H;
      ctx.font = FONT_STR;
      ctx.textBaseline = 'top';
      
      pre.style.fontSize = `${FONT_PX}px`;
      pre.style.lineHeight = `${charH}px`;
      pre.style.letterSpacing = '0px';

      origChars = new Uint8Array(N);
      colR = new Uint8Array(N);
      colG = new Uint8Array(N);
      colB = new Uint8Array(N);

      if (!imgObj.complete || imgObj.naturalWidth === 0) return;

      const src = document.createElement('canvas');
      src.width = cols; src.height = rows;
      const sx = src.getContext('2d');
      
      const aspect = imgObj.naturalWidth / imgObj.naturalHeight;
      const screenAspect = cols / rows;
      let dw = cols, dh = rows, dx = 0, dy = 0;
      if(screenAspect > aspect) { dh = cols / aspect; dy = (rows - dh)/2; }
      else { dw = rows * aspect; dx = (cols - dw)/2; }
      
      sx.drawImage(imgObj, dx, dy, dw, dh);
      const { data } = sx.getImageData(0, 0, cols, rows);
      
      let brightnessMap = new Float32Array(N);
      let textContent = '';

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const idx = r*cols + c;
          const p = idx*4;
          colR[idx] = data[p]; colG[idx] = data[p+1]; colB[idx] = data[p+2];
          const b = 0.299*data[p] + 0.587*data[p+1] + 0.114*data[p+2];
          
          let chIdx = Math.floor((b/255)*(CHARS_SRC.length-1));
          origChars[idx] = chIdx;
          textContent += CHARS_SRC[chIdx];
          brightnessMap[idx] = b;
        }
        textContent += '\n';
      }
      pre.textContent = textContent;

      let peaks = [];
      let radius = Math.floor(Math.min(cols, rows) / 5); 
      
      for(let k=0; k<5; k++) {
          let maxB = -1;
          let maxIdx = -1;
          for(let i=0; i<N; i++) {
              if(brightnessMap[i] > maxB) {
                  let c = i % cols;
                  let r = Math.floor(i / cols);
                  if(c > radius && c < cols-radius && r > radius && r < rows-radius) {
                      maxB = brightnessMap[i];
                      maxIdx = i;
                  }
              }
          }
          if(maxIdx === -1) break;
          
          let pCol = maxIdx % cols;
          let pRow = Math.floor(maxIdx / cols);
          peaks.push({c: pCol, r: pRow});
          
          for(let r = pRow - radius; r <= pRow + radius; r++) {
              for(let c = pCol - radius; c <= pCol + radius; c++) {
                  if (r>=0 && r<rows && c>=0 && c<cols) {
                     if(Math.sqrt((r-pRow)**2 + (c-pCol)**2) < radius) {
                         brightnessMap[r*cols + c] = -1;
                     }
                  }
              }
          }
      }
      
      for(let k=0; k<skillsData.length; k++) {
          if(peaks[k]) {
              skillsData[k].pos = {x: peaks[k].c / cols, y: peaks[k].r / rows};
              
              let idx = peaks[k].r * cols + peaks[k].c;
              let r = colR[idx];
              let g = colG[idx];
              let b = colB[idx];
              
              let maxChan = Math.max(r, g, b, 1);
              let mult = 255 / maxChan;
              let themeR = Math.min(255, Math.floor(r * mult * 0.85 + 40));
              let themeG = Math.min(255, Math.floor(g * mult * 0.85 + 40));
              let themeB = Math.min(255, Math.floor(b * mult * 0.85 + 40));
              
              if (Math.abs(themeR-themeG) < 20 && Math.abs(themeG-themeB) < 20) {
                  const fallbacks = [
                      [0, 229, 255], [124, 58, 237], [16, 185, 129], [255, 60, 100], [255, 180, 0]
                  ];
                  [themeR, themeG, themeB] = fallbacks[k % fallbacks.length];
              }
              
              skillsData[k].color = `rgb(${themeR}, ${themeG}, ${themeB})`;
              skillsData[k].glow  = `rgba(${themeR}, ${themeG}, ${themeB}, 0.5)`;
          } else {
              skillsData[k].pos = {x: 0.5, y: 0.5};
              skillsData[k].color = '#00e5ff';
              skillsData[k].glow = 'rgba(0,229,255,0.5)';
          }
      }
    }

    imgObj.onload = () => {
      setupGrid();
      // Start curtain unlock
      setTimeout(() => { document.body.classList.add('loaded'); }, 100);
    };
    imgObj.src = images[currentImgIdx];

    document.getElementById('btn-next-img').addEventListener('click', () => {
      currentImgIdx = (currentImgIdx + 1) % images.length;
      imgObj.src = images[currentImgIdx];
    });

    // Handle Resize
    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(setupGrid, 200);
    });

    let mx = -999, my = -999;
    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
    document.addEventListener('mouseleave', () => { mx = -999, my = -999 });

    let activeSkill = null;
    const modal = document.getElementById('skill-detail');
    const modalTitle = document.getElementById('modal-title');
    const modalTools = document.getElementById('modal-tools');
    const modalDesc = document.getElementById('modal-desc');
    const skillCard = document.querySelector('.skill-card');
    
    // Listen on pre to avoid overlapping issues
    pre.addEventListener('click', () => {
      if(activeSkill !== null || !N) return;
      
      const mCol = mx / charW;
      const mRow = my / charH;

      for(let s of skillsData) {
        if(!s.pos) continue;
        const cCol = s.pos.x * cols;
        const cRow = s.pos.y * rows;
        
        const distCol = (cCol - mCol);
        const distRow = (cRow - mRow) * (charH/charW);
        const dist = Math.sqrt(distCol*distCol + distRow*distRow);
        
        if(dist < 15) { 
          cam.targetScale = 3.5;
          cam.targetX = cCol * charW;
          cam.targetY = cRow * charH;
          activeSkill = s;
          
          modalTitle.innerText = s.title;
          modalTools.innerText = s.tools;
          modalDesc.innerText = s.desc;
          
          modalTitle.style.color = s.color;
          modalTitle.style.textShadow = `0 0 15px ${s.glow}`;
          skillCard.style.borderColor = s.glow;
          skillCard.style.boxShadow = `0 0 40px ${s.glow}`;
          
          setTimeout(() => { modal.classList.add('active'); }, 600);
          break;
        }
      }
    });

    document.getElementById('btn-close').addEventListener('click', () => {
      modal.classList.remove('active');
      activeSkill = null;
      cam.targetScale = 1;
      cam.targetX = 0;
      cam.targetY = 0;
    });

    const randChar = () => CHARS_DIST[Math.floor(Math.random()*CHARS_DIST.length)];

    function frame() {
      if(!N) {
        requestAnimationFrame(frame);
        return;
      }

      cam.scale += (cam.targetScale - cam.scale) * 0.05;
      if(cam.targetScale === 1) {
        cam.x += (0 - cam.x) * 0.05;
        cam.y += (0 - cam.y) * 0.05;
      } else {
        const tgtX = W/2 - cam.targetX * cam.scale;
        const tgtY = H/2 - cam.targetY * cam.scale;
        cam.x += (tgtX - cam.x) * 0.05;
        cam.y += (tgtY - cam.y) * 0.05;
      }

      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);
      
      ctx.save();
      ctx.translate(cam.x, cam.y);
      ctx.scale(cam.scale, cam.scale);

      time += 0.05;
      
      const mCol = (mx - cam.x) / cam.scale / charW;
      const mRow = (my - cam.y) / cam.scale / charH;

      for (let r = 0; r < rows; r++) {
        const y = r * charH;
        for (let c = 0; c < cols; c++) {
          const idx = r*cols+c;
          
          const screenX = cam.x + c * charW * cam.scale;
          const screenY = cam.y + r * charH * cam.scale;
          if (screenX < -20 || screenX > W+20 || screenY < -20 || screenY > H+20) continue;

          let ch = CHARS_SRC[origChars[idx]];
          
          let r_ = colR[idx];
          let g_ = colG[idx];
          let b_ = colB[idx];
          
          // --- Ambient core distortion (Pulse so they are visible) ---
          for (let i = 0; i < skillsData.length; i++) {
             let s = skillsData[i];
             if(!s.pos) continue;
             const cc = s.pos.x * cols;
             const cr = s.pos.y * rows;
             const cdx = (c + 0.5) - cc;
             const cdy = (r + 0.5) - cr;
             const distToCore = Math.sqrt(cdx*cdx + cdy*cdy * Math.pow(charH/charW, 2));
             
             if(distToCore < 8 && cam.targetScale === 1) {
                const pulse = Math.sin(time*1.5 + i) * 0.5 + 0.5; // 0 to 1 wave
                const strength = Math.max(0, 1 - distToCore/8) * pulse;
                
                if (strength > 0.4 && Math.random() < strength * 0.2) {
                   ch = randChar(); // slight persistent static
                }
                
                // Color boost based on the semantic theme
                let rgbParts = s.color.match(/\d+/g);
                if (rgbParts && rgbParts.length >= 3) {
                   r_ = Math.min(255, r_ + parseInt(rgbParts[0]) * strength * 0.4) | 0;
                   g_ = Math.min(255, g_ + parseInt(rgbParts[1]) * strength * 0.4) | 0;
                   b_ = Math.min(255, b_ + parseInt(rgbParts[2]) * strength * 0.4) | 0;
                }
             }
          }
          
          // Hover effect natural distortion like home
          const dx = (c + 0.5) - mCol;
          const dy = (r + 0.5) - mRow;
          const distToMouse = Math.sqrt(dx*dx + dy*dy) * charW;
          const DIST_R = 30;

          if (distToMouse < DIST_R && cam.targetScale === 1) {
             const h = Math.pow(1 - distToMouse/DIST_R, 2);
             if (h > 0.05 && Math.random() < h) ch = randChar();
             
             const boost = h * 180;
             r_ = Math.min(255, r_ + boost*0.6) | 0;
             g_ = Math.min(255, g_ + boost*0.9) | 0;
             b_ = Math.min(255, b_ + boost*0.7) | 0;
          }

          if (r_ > 10 || g_ > 10 || b_ > 10) {
            ctx.fillStyle = `rgb(${r_},${g_},${b_})`;
            ctx.fillText(ch, c*charW, y);
          }
        }
      }
      
      // Draw big font labels
      if(cam.scale < 1.1) {
        pre.style.cursor = 'default';
        for(let s of skillsData) {
          if(!s.pos) continue;
          const cc = s.pos.x * cols;
          const cr = s.pos.y * rows;
          const x = cc * charW;
          const y = cr * charH;
          
          const dx = cc - mCol;
          const dy = cr - mRow;
          const distToMouse = Math.sqrt(dx*dx + dy*dy*(charH/charW));
          
          if (distToMouse < 18) {
            ctx.font = `bold 42px "Space Grotesk"`;
            ctx.fillStyle = s.color;
            ctx.shadowColor = s.color;
            ctx.shadowBlur = 15;
            ctx.fillText(` ${s.title} `, x, y);
            ctx.shadowBlur = 0;
            ctx.font = FONT_STR; // reset
            pre.style.cursor = 'pointer';
          }
        }
      } else {
        pre.style.cursor = 'crosshair';
      }

      ctx.restore();
      requestAnimationFrame(frame);
    }
    
    requestAnimationFrame(frame);

  </script>
</body>
</html>
