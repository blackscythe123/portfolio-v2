<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WebGL Cloth Tear Animation</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #111;
      font-family: monospace;
    }
    canvas {
      display: block;
    }
    #ui {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 10;
    }
    button {
      padding: 12px 24px;
      font-size: 1.2rem;
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      color: #fff;
      background: transparent;
      border: 2px solid #00e5ff;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: all 0.3s ease;
      box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
    }
    button:hover {
      background: rgba(0, 229, 255, 0.2);
      box-shadow: 0 0 20px rgba(0, 229, 255, 0.6);
      text-shadow: 0 0 8px #00e5ff;
    }
    .hint {
      color: rgba(255, 255, 255, 0.5);
      margin-top: 10px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  
  <div id="ui">
    <button id="cutBtn">[ CUT CLOTH ]</button>
    <div class="hint">Simulates a high-performance GLSL scissor shred</div>
  </div>

  <!-- Load Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  
  <script>
    // ── 1. Scene Setup ───────────────────────────────────────────────
    const scene = new THREE.Scene();
    // basic minimal fog to hide background edges
    scene.fog = new THREE.FogExp2(0x111111, 0.02);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 15);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // ── 2. Cloth Geometry & Synthetic Texture ────────────────────────
    // We use a high subdivision plane to ensure smooth curving and tearing
    const width = 24;
    const height = 12;
    const segX = 400; // Dense geometry for smooth tear edges
    const segY = 200;
    const geometry = new THREE.PlaneGeometry(width, height, segX, segY);

    // Dynamically create a grid/ui texture so we don't need external assets
    const texCanvas = document.createElement('canvas');
    texCanvas.width = 1024; texCanvas.height = 512;
    const tctx = texCanvas.getContext('2d');
    tctx.fillStyle = '#1a1a24'; tctx.fillRect(0, 0, 1024, 512);
    tctx.strokeStyle = 'rgba(0, 229, 255, 0.2)'; tctx.lineWidth = 2;
    for(let i=0; i<1024; i+=32) {
      tctx.beginPath(); tctx.moveTo(i, 0); tctx.lineTo(i, 512); tctx.stroke();
    }
    for(let i=0; i<512; i+=32) {
      tctx.beginPath(); tctx.moveTo(0, i); tctx.lineTo(1024, i); tctx.stroke();
    }
    tctx.fillStyle = '#00e5ff';
    tctx.font = 'bold 80px monospace';
    tctx.textAlign = 'center';
    tctx.fillText('SYSTEM.FABRIC.LOCK', 512, 270);

    const texture = new THREE.CanvasTexture(texCanvas);
    texture.anisotropy = renderer.capabilities.getMaxAnisotropy();

    // ── 3. Vertex Split/Side Precalculation ─────────────────────────
    // We compute a jagged line across the plane in JS.
    // If a vertex is above the line -> top (+1), below -> bottom (0).
    const pos = geometry.attributes.position;
    const uvs = geometry.attributes.uv;
    const sides = new Float32Array(pos.count);

    // Simple multi-octave noise for jagged tear line
    function simpleNoise(x) {
      return Math.sin(x * 12.0) * 0.04 + Math.sin(x * 35.0) * 0.02 + Math.sin(x * 80.0) * 0.005;
    }

    for (let i = 0; i < pos.count; i++) {
        let ux = uvs.getX(i);
        let uy = uvs.getY(i);
        let cutY = 0.5 + simpleNoise(ux); 
        sides[i] = uy > cutY ? 1.0 : 0.0;
    }
    geometry.setAttribute('aSide', new THREE.BufferAttribute(sides, 1));

    // ── 4. GLSL Shaders ─────────────────────────────────────────────
    const vertexShader = `
      attribute float aSide;
      
      varying vec2 vUv;
      varying float vSide;
      varying float vLighting;
      
      uniform float uTime;
      uniform float uCutProgress;
      
      void main() {
          vUv = uv;
          vSide = aSide;
          vec3 p = position;
          
          // Slight waving/tension before tearing (wind effect)
          float wind = sin(p.x * 0.5 + uTime * 2.0) * cos(p.y * 0.5 + uTime) * 0.2;
          p.z += wind * smoothstep(0.0, 0.4, uCutProgress - uv.x + 0.5); // decrease wind if torn
          
          // ── Tear Displacement ──
          // Only displace vertices that the "scissor" has passed
          if (uv.x < uCutProgress) {
              // Distance from the cut point (eases out as it goes back)
              float dist = (uCutProgress - uv.x);
              
              // Curling/peeling depth effect
              float curl = pow(dist, 1.2) * 4.0;
              
              if (aSide > 0.5) {
                  // Top half pulls Up and Curls Out
                  p.y += dist * 1.5;
                  p.z += curl;
                  p.x -= dist * 0.5; // slight contraction
              } else {
                  // Bottom half pulls Down and Curls Back
                  p.y -= dist * 1.8;
                  p.z -= curl * 0.8;
                  p.x -= dist * 0.3;
              }
          }
          
          // Fake lighting / shading based on Z displacement
          vLighting = 1.0 + (p.z * 0.3);
          
          gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
      }
    `;

    const fragmentShader = `
      varying vec2 vUv;
      varying float vSide;
      varying float vLighting;
      
      uniform sampler2D uTexture;
      uniform float uCutProgress;
      
      void main() {
          // ── The Bridging Triangle Discard Trick ──
          // When a triangle spans across the top and bottom sides, vSide gets interpolated.
          // By discarding fragments where vSide is between (0, 1), we perfectly 
          // delete the stretched polygons that bridge the gap, revealing a clean slice!
          if (vUv.x < uCutProgress) {
              if (vSide > 0.001 && vSide < 0.999) {
                  discard;
              }
          }
          
          vec4 texColor = texture2D(uTexture, vUv);
          
          // Apply fake lighting depth
          texColor.rgb *= vLighting;
          
          // Highlight the raw torn edges slightly
          if (vUv.x < uCutProgress) {
              float edgeDist = min(vSide, 1.0 - vSide);
              if (edgeDist > 0.0 && edgeDist < 0.02) {
                  texColor.rgb += vec3(0.3, 0.3, 0.4); // bright frayed edge
              }
          }
          
          gl_FragColor = texColor;
      }
    `;

    const material = new THREE.ShaderMaterial({
      uniforms: {
        uTime: { value: 0 },
        uCutProgress: { value: -0.1 },
        uTexture: { value: texture }
      },
      vertexShader: vertexShader,
      fragmentShader: fragmentShader,
      side: THREE.DoubleSide // see insides when it curls
    });

    const cloth = new THREE.Mesh(geometry, material);
    scene.add(cloth);

    // ── 5. Animation & Interaction ──────────────────────────────────
    let isTearing = false;
    let cutVelocity = 0;
    
    document.getElementById('cutBtn').addEventListener('click', () => {
        isTearing = true;
        // Reset if clicking again after it finishes
        if (material.uniforms.uCutProgress.value > 1.2) {
            material.uniforms.uCutProgress.value = -0.1;
            cutVelocity = 0;
        }
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();
      
      material.uniforms.uTime.value += delta;

      if (isTearing) {
          // Non-linear easing (starts slow, speeds up through the fabric)
          if (cutVelocity < 0.8) {
              cutVelocity += delta * 0.5; 
          }
          material.uniforms.uCutProgress.value += cutVelocity * delta;
          
          // Stop tearing when far off screen
          if (material.uniforms.uCutProgress.value > 1.3) {
              isTearing = false;
              cutVelocity = 0;
          }
      }

      // Slight floating of the whole cloth
      cloth.rotation.y = Math.sin(material.uniforms.uTime.value * 0.5) * 0.05;
      cloth.rotation.x = Math.cos(material.uniforms.uTime.value * 0.3) * 0.02;

      renderer.render(scene, camera);
    }

    animate();

    // Handle Window Resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
