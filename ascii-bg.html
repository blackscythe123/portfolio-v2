<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Simiyon Vinscent Samuel L</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100vw; height: 100vh;
      background: #000;
      overflow: hidden;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── ASCII layers ── */
    #visual   { position: fixed; inset: 0; z-index: 1; display: block; }
    #selectable {
      position: fixed; inset: 0; z-index: 2;
      font-family: 'Courier New', monospace;
      white-space: pre; line-height: 1;
      color: transparent; background: transparent;
      cursor: crosshair;
      user-select: text; -webkit-user-select: text;
      overflow: hidden;
    }
    #selectable::selection { background: rgba(0,229,255,0.3); color: transparent; }

    /* ── Dark scrim: gradient from right so text is always readable ── */
    /* Not a box — just darkness that fades in from the right edge.    */
    #overlay {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 62%;
      min-width: 540px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 5rem;
      pointer-events: none;

      /* Directional scrim — darkens right half so text reads clearly */
      background: linear-gradient(
        to right,
        transparent 0%,
        rgba(0,0,0,0.50) 20%,
        rgba(0,0,0,0.72) 60%,
        rgba(0,0,0,0.85) 100%
      );
    }

    /* ── Greeting ── */
    .greeting {
      font-size: 0.78rem;
      letter-spacing: 0.22em;
      color: rgba(255,255,255,0.55);          /* muted white — reads on dark scrim */
      margin-bottom: 1.8rem;
      display: flex;
      align-items: center;
      gap: 0.9rem;
      opacity: 0;
      animation: fadeUp 0.8s 0.2s ease forwards;
    }
    .status-badge {
      border: 1px solid rgba(0,229,255,0.5);  /* cyan border pops on dark */
      padding: 3px 10px;
      font-size: 0.62rem;
      text-transform: uppercase;
      background: rgba(0,229,255,0.08);
      color: #00e5ff;                          /* full cyan, contrasty on dark */
      letter-spacing: 0.22em;
    }
    .greeting-slash {
      color: rgba(255,255,255,0.3);
    }

    /* ── Name ── */
    .name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(1.5rem, 3.2vw, 3.2rem);
      font-weight: 900;
      line-height: 1.05;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 1.8rem;
      opacity: 0;
      white-space: nowrap;
      animation: fadeUp 0.8s 0.4s ease forwards;

      color: #ffffff;
      /* Multi-layer shadow lifts text off any color beneath (UI skill §6) */
      text-shadow:
        0 0 1px rgba(0,0,0,1),
        0 2px 8px rgba(0,0,0,0.9),
        0 4px 24px rgba(0,0,0,0.7);
    }
    .name .hl {
      color: #00e5ff;
      text-shadow:
        0 0 20px rgba(0,229,255,0.7),
        0 2px 8px rgba(0,0,0,0.9);
    }

    /* ── Typing line ── */
    .typing-wrap {
      font-size: 0.82rem;
      font-weight: 400;
      color: rgba(255,255,255,0.75);
      margin-bottom: 2.8rem;
      min-height: 1.4em;
      letter-spacing: 0.04em;
      opacity: 0;
      animation: fadeUp 0.8s 0.6s ease forwards;
    }
    .prompt {
      color: #10b981;
      margin-right: 10px;
      font-weight: 700;
      text-shadow: 0 0 8px rgba(16,185,129,0.5);
    }
    #typed-text {
      color: #fff;
      text-shadow: 0 0 4px rgba(0,0,0,0.8);
    }
    .caret {
      display: inline-block;
      width: 8px; height: 0.9em;
      background: #00e5ff;
      vertical-align: text-bottom;
      margin-left: 4px;
      box-shadow: 0 0 6px rgba(0,229,255,0.8);
      animation: blink 1s step-end infinite;
    }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      pointer-events: auto;
      opacity: 0;
      animation: fadeUp 0.8s 0.85s ease forwards;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      gap: 0.7rem;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      color: rgba(255,255,255,0.85);        /* visible at rest */
      transition: all 220ms ease;
      padding: 2px 0;
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
    }
    .btn-num {
      font-size: 0.58rem;
      color: #00e5ff;
      font-weight: 400;
      letter-spacing: 0.05em;
      opacity: 0.7;
    }
    .btn::after {
      content: '→';
      font-size: 0.75rem;
      color: rgba(255,255,255,0.25);
      transition: all 220ms ease;
    }
    .btn:hover {
      color: #00e5ff;
      text-shadow: 0 0 10px rgba(0,229,255,0.4);
      transform: translateX(8px);
    }
    .btn:hover::after {
      color: #00e5ff;
      transform: translateX(4px);
    }
    .btn:hover .btn-num { opacity: 1; }

    /* ── Keyframes ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); filter: blur(4px); }
      to   { opacity: 1; transform: translateY(0);    filter: blur(0);   }
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* Responsive */
    @media (max-width: 900px) {
      #overlay { width: 100%; min-width: 0; padding: 0 2rem; }
    }
  </style>
</head>
<body>

  <!-- ASCII layers -->
  <canvas id="visual"></canvas>
  <pre id="selectable" aria-label="ASCII art — selectable"></pre>

  <!-- Text overlay — no background box, terminal/brutalist aesthetics -->
  <div id="overlay" aria-label="Portfolio intro">

    <p class="greeting">
      <span class="status-badge">sys.init</span>
      // HELLO WORLD
    </p>

    <h1 class="name">
      Simiyon <span class="hl">Vinscent</span> Samuel L
    </h1>

    <div class="typing-wrap">
      <span class="prompt">$></span><span id="typed-text"></span><span class="caret" aria-hidden="true"></span>
    </div>

    <nav class="btn-row" aria-label="Portfolio sections">
      <a href="#skills"   class="btn" id="btn-skills"><span class="btn-num">01</span> Skills</a>
      <a href="#projects" class="btn" id="btn-projects"><span class="btn-num">02</span> Projects</a>
      <a href="#contact"  class="btn" id="btn-contact"><span class="btn-num">03</span> Contact</a>
    </nav>
  </div>

  <!-- ASCII engine -->
  <script type="module">
    // ── Pretext ──────────────────────────────────────────────────
    let layoutWithLines, prepareWithSegments;
    try {
      const m = await import('https://esm.sh/@chenglou/pretext@0.1.4');
      layoutWithLines     = m.layoutWithLines;
      prepareWithSegments = m.prepareWithSegments;
    } catch(e) {}

    // ── Config ───────────────────────────────────────────────────
    const FONT_PX    = 9;
    const FONT_STR   = `${FONT_PX}px "Courier New", Courier, monospace`;
    const CHARS_DIST = '01jfQWERTYUIOASDFGHJKLZXCVBNM@';
    const CHARS_SRC  = '01jfQWERTYUIOASDFGHJKLZXCVBNM@';
    const DIST_R     = 30;
    const DIST_DECAY = 0.82;
    const HEAT_GAIN  = 1.0;

    // ── Measure charWidth via Pretext ────────────────────────────
    await document.fonts.ready;
    let charW = FONT_PX * 0.601;
    const charH = FONT_PX;

    if (prepareWithSegments && layoutWithLines) {
      try {
        const p = prepareWithSegments('X'.repeat(100), FONT_STR);
        const r = layoutWithLines(p, Infinity, charH);
        if (r.lines?.length) charW = r.lines[0].width / 100;
      } catch(e) {}
    } else {
      const oc = new OffscreenCanvas(400,20).getContext('2d');
      oc.font  = FONT_STR;
      charW    = oc.measureText('X'.repeat(50)).width / 50;
    }

    let W, H, cols, rows, N, heat;
    let origChars, gridChars, colR, colG, colB;
    let isTearRunning = false;
    
    const pre = document.getElementById('selectable');
    const canvas = document.getElementById('visual');
    const ctx = canvas.getContext('2d');
    const imgObj = new Image();
    imgObj.crossOrigin = 'anonymous';

    function setupGrid() {
      W = window.innerWidth;
      H = window.innerHeight;
      cols = Math.floor(W / charW);
      rows = Math.floor(H / charH);
      N = cols * rows;

      pre.style.fontSize      = `${FONT_PX}px`;
      pre.style.lineHeight    = `${charH}px`;
      pre.style.letterSpacing = '0px';

      origChars = new Int16Array(N);
      gridChars = new Int16Array(N);
      colR = new Uint8Array(N);
      colG = new Uint8Array(N);
      colB = new Uint8Array(N);
      heat = new Float32Array(N);
      
      canvas.width = W; 
      canvas.height = H;
      ctx.font = FONT_STR;
      ctx.textBaseline = 'top';

      if(!imgObj.complete || imgObj.naturalWidth === 0) return;

      const src = document.createElement('canvas');
      src.width = cols; src.height = rows;
      const sx  = src.getContext('2d');
      
      // Reverting to strict stretch to ensure the full image is visible
      sx.drawImage(imgObj, 0, 0, cols, rows);
      const { data } = sx.getImageData(0, 0, cols, rows);
      
      let txt = '';
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const idx = r*cols + c;
          const p = idx*4;
          colR[idx] = data[p]; colG[idx] = data[p+1]; colB[idx] = data[p+2];
          const b = 0.299*data[p] + 0.587*data[p+1] + 0.114*data[p+2];
          const chIdx = Math.floor((b/255)*(CHARS_SRC.length-1));
          origChars[idx] = chIdx;
          gridChars[idx] = chIdx;
          txt += CHARS_SRC[chIdx];
        }
        txt += '\n';
      }
      pre.textContent = txt;
    }

    imgObj.onload = setupGrid;
    imgObj.src = 'home-original.webp';
    
    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(setupGrid, 200);
    });
    let mx = -9999, my = -9999;
    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
    document.addEventListener('mouseleave', () => { mx = -9999; my = -9999; });

    // Blast mechanic
    document.addEventListener('click', (e) => {
      const tag = e.target.tagName.toLowerCase();
      if (tag === 'button' || tag === 'a' || e.target.closest('a') || e.target.closest('button')) return;
      
      if(!N) return;
      const bc = Math.floor(e.clientX / charW);
      const br = Math.floor(e.clientY / charH);
      const radius = 12; // Blast radius in cells
      for(let r = br - radius; r <= br + radius; r++) {
        for(let c = bc - radius; c <= bc + radius; c++) {
          if (r>=0 && r<rows && c>=0 && c<cols) {
            const dist = Math.sqrt((c-bc)**2 + (r-br)**2 * Math.pow(charH/charW, 2));
            if (dist <= radius) {
                const idx = r*cols + c;
                gridChars[idx] = -1; // Blow hole
                // Optional: set high heat for blast ring
                if (dist > radius - 2) heat[idx] = 1.0;
            }
          }
        }
      }
    });

    const randChar = () => CHARS_DIST[Math.floor(Math.random()*CHARS_DIST.length)];

    function frame() {
      if (!N) {
        requestAnimationFrame(frame);
        return;
      }
      
      // Physics gravity simulation
      let gridChanged = false;
      for (let c = 0; c < cols; c++) {
          // Bottom-up evaluation per column
          for (let r = rows - 1; r > 0; r--) {
              const idx = r*cols + c;
              if (gridChars[idx] === -1) {
                  const idxAbove = (r-1)*cols + c;
                  if (gridChars[idxAbove] !== -1) {
                      gridChars[idx] = gridChars[idxAbove];
                      gridChars[idxAbove] = -1;
                      gridChanged = true;
                  }
              }
          }
          // Spawner row (falls from the top)
      if (gridChars[c] === -1 && !isTearRunning) {
              gridChars[c] = origChars[c];
              gridChanged = true;
          }
      }
      // If tear is running, freeze the ASCII engine silently
      
      if (gridChanged) {
         let txt = '';
         for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
               const chIdx = gridChars[r*cols+c];
               txt += chIdx === -1 ? ' ' : CHARS_SRC[chIdx];
            }
            txt += '\n';
         }
         pre.textContent = txt;
      }

      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);
      const mCol = mx / charW;
      const mRow = my / charH;

      for (let r = 0; r < rows; r++) {
        const y = r * charH;
        for (let c = 0; c < cols; c++) {
          const idx = r*cols+c;
          
          if (gridChars[idx] === -1) continue; // the void
          
          const dx  = (c+0.5) - mCol;
          const dy  = (r+0.5) - mRow;
          const dist = Math.sqrt(dx*dx + dy*dy) * charW;

          if (dist < DIST_R) {
            const s = Math.pow(1 - dist/DIST_R, 2);
            heat[idx] = Math.min(1, heat[idx] + HEAT_GAIN*s);
          }
          heat[idx] *= DIST_DECAY;
          const h = heat[idx];

          const ch = (h > 0.05 && Math.random() < h) ? randChar() : CHARS_SRC[gridChars[idx]];
          const boost = h * 180;
          const r_ = Math.min(255, colR[idx] + boost*0.6)|0;
          const g_ = Math.min(255, colG[idx] + boost*0.9)|0;
          const b_ = Math.min(255, colB[idx] + boost*0.7)|0;

          ctx.fillStyle = `rgb(${r_},${g_},${b_})`;
          ctx.fillText(ch, c*charW, y);
        }
      }
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

    // ── Typing effect ───────────────────────────────────────────
    const phrases = [
      'make run creative_developer',
      './deploy_full_stack.sh',
      'sudo rm -rf boring_designs'
    ];
    const el = document.getElementById('typed-text');
    let pi = 0, ci = 0, deleting = false;

    function typeLoop() {
      const phrase = phrases[pi];
      if (!deleting) {
        ci++;
        el.textContent = phrase.slice(0, ci);
        if (ci === phrase.length) {
          deleting = true;
          setTimeout(typeLoop, 2000);
          return;
        }
        setTimeout(typeLoop, 50 + Math.random() * 50);
      } else {
        ci--;
        el.textContent = phrase.slice(0, ci);
        if (ci === 0) {
          deleting = false;
          pi = (pi + 1) % phrases.length;
          setTimeout(typeLoop, 600);
          return;
        }
        setTimeout(typeLoop, 20);
      }
    }
    setTimeout(typeLoop, 1500);

    // ── Scissor Screen Tear Transition ────────────────────────────
    const btnSkills = document.getElementById('btn-skills');

    btnSkills.addEventListener('click', async (e) => {
      e.preventDefault();
      if (isTearRunning) return;
      isTearRunning = true;
      deleting = true;

      // Snapshot the live ASCII canvas frame into GPU-resident ImageBitmap
      const bitmap = await createImageBitmap(canvas);

      // Full-screen overlay canvas — sits above everything including HTML overlay
      const oc = document.createElement('canvas');
      oc.width = W; oc.height = H;
      oc.style.cssText = 'position:fixed;inset:0;z-index:99999;pointer-events:none;';
      document.body.appendChild(oc);
      const ox = oc.getContext('2d');

      // Instantly fade out the HTML text/button overlay
      document.getElementById('overlay').style.cssText += ';opacity:0;transition:opacity 0.08s;';

      // ── ASYMPTOTIC SCROLL-CURL PHYSICS ────────────────────────────
      // The key: render ~3px-wide vertical strips.
      // Each strip at distance d from the cutting tip uses:
      //   curl(d) = (d / cutX) ^ 0.25
      // This is a steep power curve:
      //   d≈0 (just past cut tip): slope is nearly vertical → tight spiral curl
      //   d=10% of cut area: curl ≈ 0.56 (already 56% peeled)
      //   d=100% (left edge): curl = 1.0 (fully unrolled, maximum displacement)
      // Top strips fly up, bottom strips fly down.
      // Result: material RIGHT AT THE CUT EDGE curls into a tight inward spiral;
      // material cut long ago has fully unrolled and is flying off-screen.

      const STRIP_W = 3;             // px width of each vertical strip
      const CUT_DURATION  = 2600;    // ms for scissor to sweep left → right
      const TOTAL_DURATION = 3800;   // ms total before redirect
      const MAX_PEEL = H * 1.3;      // displacement beyond which a strip is off-screen

      const startTime = performance.now();
      let done = false;

      function drawFrame(now) {
        if (done) return;
        const elapsed = now - startTime;

        // ── Cut sweep progress (ease-in so it starts gently) ──
        const rawP = Math.min(1, elapsed / CUT_DURATION);
        const cutProgress = rawP * rawP; // quadratic ease-in
        const cutX = cutProgress * W;

        // ── Global peel factor (smoothstep across full duration) ──
        const peelT = Math.min(1, elapsed / TOTAL_DURATION);
        const peelFactor = peelT * peelT * (3 - 2 * peelT);

        // Black background
        ox.fillStyle = '#000';
        ox.fillRect(0, 0, W, H);

        // ── Right of cut: draw untouched image ──
        if (cutX < W) {
          ox.save();
          ox.beginPath();
          ox.rect(cutX, 0, W - cutX, H);
          ox.clip();
          ox.drawImage(bitmap, 0, 0, W, H);
          ox.restore();
        }

        // ── Per-strip asymptotic scroll curl ──
        for (let x = 0; x < cutX; x += STRIP_W) {
          const sw = Math.min(STRIP_W + 1, cutX - x); // strip width
          if (sw <= 0) continue;

          // Normalised distance from cut: 0 = AT the cut tip, 1 = leftmost point
          const s = cutX > 0 ? (cutX - x) / cutX : 1;

          // Asymptotic curl curve!
          const curl = Math.pow(s, 0.25);
          const yOff = MAX_PEEL * peelFactor * curl;

          // Dim the tightly coiled areas near the cut to simulate shading
          ox.globalAlpha = 0.65 + 0.35 * curl;

          // TOP half strip
          ox.save();
          ox.beginPath();
          ox.rect(x, 0, sw, H / 2);
          ox.clip();
          ox.transform(1, 0, 0, 1, 0, -yOff);
          ox.drawImage(bitmap, x, 0, sw, H / 2, x, 0, sw, H / 2);
          ox.restore();

          // BOTTOM half strip
          ox.save();
          ox.beginPath();
          ox.rect(x, H / 2, sw, H / 2);
          ox.clip();
          ox.transform(1, 0, 0, 1, 0, yOff);
          ox.drawImage(bitmap, x, H / 2, sw, H / 2, x, H / 2, sw, H / 2);
          ox.restore();
        }

        ox.globalAlpha = 1;

        // ── Glowing scissor tip at the moving cut point ──
        if (cutProgress > 0.005 && cutProgress < 0.995) {
          const cx = cutX;
          const cy = H / 2;

          const grd = ox.createRadialGradient(cx, cy, 0, cx, cy, 55);
          grd.addColorStop(0,   'rgba(0,255,210,0.75)');
          grd.addColorStop(0.35,'rgba(0,229,255,0.3)');
          grd.addColorStop(1,   'rgba(0,229,255,0)');
          
          ox.fillStyle = grd;
          ox.beginPath();
          ox.arc(cx, cy, 55, 0, Math.PI * 2);
          ox.fill();

          ox.strokeStyle = 'rgba(255,255,255,0.85)';
          ox.lineWidth = 1.5;
          ox.beginPath();
          ox.moveTo(cx, cy - 18);
          ox.lineTo(cx, cy + 18);
          ox.stroke();
        }

        // Navigate when done
        if (elapsed >= TOTAL_DURATION) {
          done = true;
          window.location.href = 'skills.html';
          return;
        }

        requestAnimationFrame(drawFrame);
      }

      requestAnimationFrame(drawFrame);
    });
  </script>
</body>
</html>
